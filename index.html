<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Luna Classic - Premium Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Noto+Sans+Arabic:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --gold: #D4AF37;
            --metallic: linear-gradient(135deg, #c59b4c, #f8e1a0, #d4af37, #8b6220);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; transition: all 0.3s ease; }
        
        /* بەکگراوندی جووڵاو و ڕووناکی 4K */
        body { 
            background: linear-gradient(45deg, #050505, #1f1800, #0a0a0a, #291e00);
            background-size: 400% 400%;
            animation: glowingBackground 12s ease infinite;
            color: #fff; 
            font-family: 'Montserrat', 'Noto Sans Arabic', sans-serif; 
            overflow-x: hidden;
        }

        @keyframes glowingBackground {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Hero Section & Header */
        .hero {
            height: 50vh; position: relative;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            border-bottom: 2px solid rgba(212, 175, 55, 0.2);
        }
        .video-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -2; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: -1; }
        
        /* Language Switcher */
        .lang-switcher {
            position: absolute; top: 20px; 
            display: flex; gap: 8px; background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px); padding: 5px; border-radius: 30px; 
            border: 1px solid rgba(212, 175, 55, 0.3);
        }
        .lang-btn {
            background: none; border: none; color: #fff; cursor: pointer;
            padding: 6px 15px; font-size: 0.75rem; border-radius: 20px; font-weight: bold;
        }
        .lang-btn.active { background: var(--gold); color: #000; }

        .brand-logo { width: 100px; margin-bottom: 10px; filter: drop-shadow(0 0 10px var(--gold)); }
        .brand-title { 
            font-family: 'Montserrat'; font-weight: 900; letter-spacing: 4px; font-size: 1.8rem;
            background: var(--metallic);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
        }

        /* Sticky Navigation */
        nav {
            position: sticky; top: 0; z-index: 1000;
            background: rgba(10, 10, 10, 0.98); backdrop-filter: blur(10px);
            padding: 12px 0; border-bottom: 1px solid rgba(212,175,55,0.2);
        }
        .nav-container {
            display: flex; gap: 10px; overflow-x: auto; padding: 0 15px;
            scrollbar-width: none;
        }
        .nav-link {
            text-decoration: none; color: #ccc; padding: 10px 18px;
            background: #1a1a1a; border-radius: 12px; white-space: nowrap;
            font-size: 0.85rem; border: 1px solid #333; display: flex; align-items: center; gap: 8px;
        }
        .nav-link i { color: var(--gold); }
        .nav-link:active { background: var(--gold); color: #000; }

        /* Grid */
        .section-title { 
            text-align: center; margin: 40px 0 20px; font-size: 1.5rem; 
            display: flex; flex-direction: column; align-items: center; gap: 8px;
        }
        .section-title i { color: var(--gold); font-size: 1.8rem; }
        .section-title span { background: var(--metallic); -webkit-background-clip: text; color: transparent; }

        .menu-grid {
            display: grid; grid-template-columns: repeat(2, 1fr);
            gap: 12px; padding: 0 15px; max-width: 1200px; margin: auto;
        }

        .card { 
            background: rgba(20, 20, 20, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 15px; 
            padding: 10px; 
            border: 1px solid rgba(212, 175, 55, 0.15); 
            text-align: center; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        
        .card img { 
            width: 100%; height: 120px; object-fit: cover; border-radius: 10px; margin-bottom: 8px; 
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .card img:hover { transform: scale(1.03); box-shadow: 0 0 10px rgba(212,175,55,0.4); }

        .item-name { font-size: 0.85rem; color: #fff; height: 2.4em; display: flex; align-items: center; justify-content: center; margin-bottom: 8px; }
        .item-price { font-size: 0.8rem; color: var(--gold); font-weight: bold; background: rgba(212,175,55,0.1); padding: 5px; border-radius: 6px; display: block; }

        /* Floating Buttons */
        .instagram-float {
            position: fixed; bottom: 20px; right: 20px;
            background: linear-gradient(45deg, #f09433, #dc2743, #bc1888);
            color: #fff; width: 50px; height: 50px; border-radius: 50%;
            display: flex; justify-content: center; align-items: center; font-size: 24px; text-decoration: none; z-index: 2000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .music-float {
            position: fixed; bottom: 20px; left: 20px;
            background: #1a1a1a; border: 1px solid var(--gold);
            color: var(--gold); width: 50px; height: 50px; border-radius: 50%;
            display: flex; justify-content: center; align-items: center; font-size: 20px; cursor: pointer; z-index: 2000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        /* مۆدێلی گەورەکردنی وێنەکان (Image Zoom/Modal) */
        .img-modal {
            display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.85); backdrop-filter: blur(8px);
            align-items: center; justify-content: center; flex-direction: column;
        }
        .img-modal.active { display: flex; animation: fadeIn 0.3s; }
        .img-modal img { 
            max-width: 90%; max-height: 80%; border-radius: 15px; 
            box-shadow: 0 0 40px rgba(212,175,55,0.6); border: 2px solid var(--gold); 
        }
        .close-modal { position: absolute; top: 25px; right: 35px; color: #fff; font-size: 40px; cursor: pointer; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        @media (min-width: 768px) {
            .menu-grid { grid-template-columns: repeat(4, 1fr); gap: 20px; }
            .card img { height: 180px; }
            .brand-title { font-size: 3rem; }
        }
    </style>
</head>
<body>

    <div id="imageModal" class="img-modal" onclick="closeModal()">
        <span class="close-modal">&times;</span>
        <img id="modalImg" src="">
    </div>

    <iframe src="music.mp3" allow="autoplay" style="display:none" id="iframeAudio"></iframe>

    <audio id="bg-music" loop autoplay>
        <source src="lunamusic.mp3" type="audio/mpeg">
    </audio>

    <button class="music-float" id="musicBtn" onclick="toggleMusic(event)">
        <i class="fas fa-music"></i>
    </button>

    <a href="https://www.instagram.com/luna.classics" class="instagram-float" target="_blank"><i class="fab fa-instagram"></i></a>

    <header class="hero">
        <video autoplay muted loop playsinline class="video-bg"><source src="Untitled design.mp4" type="video/mp4"></video>
        <div class="overlay"></div>

        <div class="lang-switcher">
            <button id="btn-ar" class="lang-btn" onclick="changeLang('ar', this)">AR</button>
            <button id="btn-en" class="lang-btn active" onclick="changeLang('en', this)">EN</button>
        </div>

        <img src="lunaff.png" class="brand-logo" alt="Logo">
        <h1 class="brand-title">LUNA CLASSIC</h1>
    </header>

    <nav><div class="nav-container" id="nav-items"></div></nav>

    <div id="menu-sections"></div>

    <footer style="text-align: center; padding: 40px; color: #666; font-size: 0.8rem;">
        <p>©️ 2026 lawin_web</p>
    </footer>

    <script>
        const content = {
            ar: { dir: 'rtl', nav: ['ساخن', 'بارد', 'طاقة', 'موهيتو', 'عصائر', 'حلويات', 'ارگیلة'], titles: ['مشروبات ساخنة', 'مشروبات باردة', 'مشروبات طاقة', 'موهيتو', 'عصائر طبيعية', 'حلويات', 'أرجيلة'] },
            en: { dir: 'ltr', nav: ['Hot', 'Cold', 'Energy', 'Mohito', 'Juice', 'Sweets', 'Shisha'], titles: ['HOT DRINKS', 'COLD DRINKS', 'ENERGY DRINKS', 'MOHITO', 'FRESH JUICE', 'SWEETS', 'SHISHA'] }
        };

        const config = [
            { 
                id: 'hot', icon: 'fa-mug-hot', 
                items: [
                    { img: 'photoluna/single_espresso.jpg', arName: 'قهوة اسبريسو', enName: 'Espresso', price: '3,000 IQD' },
                    { img: 'photoluna/doubleespresso.jpg', arName: 'قهوة دوبل اسبريسو', enName: 'double espresso', price: '4,000 IQD' },
                    { img: 'photoluna/cappuccino.jpg', arName: 'كابشينو', enName: 'cuppuccino', price: '4,000 IQD' },
                    { img: 'photoluna/amricano.jpeg', arName: 'امريكانو', enName: 'amricano', price: '4,000 IQD' }
                ]
            },
            { 
                id: 'cold', icon: 'fa-snowflake',
                items: [
                    { img: 'photoluna/icramricano.jpeg', arName: 'ايس امريكانو', enName: 'Ice Americano', price: '4,000 IQD' },
                    { img: 'photoluna/icelatte.jpg', arName: 'ايس لاتيه', enName: 'Ice Latte', price: '4,000 IQD' },
                    { img: 'photoluna/frap.jpeg', arName: 'فرابتشينو', enName: 'Frappuccino', price: '4,000 IQD' },
                    { img: 'photoluna/spanishlatte.jpg', arName: 'ميلك شيك', enName: 'Milkshake', price: '4,000 IQD' }
                ]
            },
            { 
                id: 'energy', icon: 'fa-bolt',
                items: [
                    { img: 'photoluna/wt.jpg', arName: 'وايت تايكر', enName: 'white tiger', price: '2,000 IQD' },
                    { img: 'photoluna/marshmello.jpg', arName: 'وايت مارشميلو', enName: 'white marshmellow', price: '2,000 IQD' },
                    { img: 'photoluna/zero.jpg', arName: 'وايت زيرو', enName: 'white zero', price: '2,000 IQD' },
                    { img: 'photoluna/smart.jpg', arName: 'مشروب سمارت', enName: 'Smart drink', price: '2,000 IQD' },
                    { img: 'photoluna/tiger.jpg', arName: 'مشروب تايكر', enName: 'tiger energy', price: '2,000 IQD' },
                    { img: 'photoluna/bubblegum.jpg', arName: 'بلنك علك', enName: 'pling bubble gum', price: '2,000 IQD' },
                    { img: 'photoluna/plinglemonmint.jpg', arName: 'بلنك  ليمون نعناع', enName: 'pling limon mint', price: '2,000 IQD' },
                    { img: 'photoluna/honeylemon.jpg', arName: 'بلنك بطيخ عسل', enName: 'pling honey melon', price: '2,000 IQD' }
                ]
            },
            { 
                id: 'mohito', icon: 'fa-cocktail',
                items: [
                    { img: 'photoluna/mojitostrawberry.jpg', arName: 'موهيتو فراولة', enName: 'Strawberry Mohito', price: '3,300 IQD' },
                    { img: 'photoluna/mojitopineapple.jpg', arName: 'موهيتو اناناس', enName: 'mojito pineapple', price: '3,000 IQD' },
                    { img: 'photoluna/mpjitolemonmint.jpg', arName: 'موهيتو ليمون نعناع', enName: 'mojito lemon mint', price: '3,000 IQD' },
                    { img: 'photoluna/mojitowatermelon.jpg', arName: 'موهيتو بطيغ', enName: 'mojito watermelon', price: '3,000 IQD' },
                    { img: 'photoluna/mojitoorange.jpg', arName: 'موهيتو برتفال', enName: 'mojito orange', price: '3,000 IQD' }
                ]
            },
            { 
                id: 'juice', icon: 'fa-glass-whiskey',
                items: [
                    { img: 'photoluna/orange.jpg', arName: 'عصير برتقال', enName: 'Orange Juice', price: '3,000 IQD' },
                    { img: 'photoluna/pomegranate.jpg', arName: 'عصير رمان', enName: 'Pomegranate Juice', price: '3,000 IQD' },
                    { img: 'photoluna/bananamilk.jpg', arName: 'عصير موز حليب', enName: 'banana milk juice', price: '3,000 IQD' },
                    { img: 'photoluna/affogado.jpg', arName: 'عصير افوكادو', enName: 'affogato juice', price: '3,000 IQD' },
                    { img: 'photoluna/lemonmint.jpg', arName: 'عصير ليمون نعناع', enName: 'lemon mint juice', price: '3,000 IQD' }
                ]
            },
            { 
                id: 'sweets', icon: 'fa-ice-cream',
                items: [
                    { img: 'photoluna/waffle.jpg', arName: 'وافل', enName: 'waffle', price: '3,000 IQD' },
                    { img: 'photoluna/crepe.jpg', arName: 'كريب', enName: 'crepe', price: '3,000 IQD' },
                    { img: 'photoluna/cake.jpg', arName: 'كيكة الشوكولاتة', enName: 'chocolate cake', price: '2,000 IQD' }
                ]
            },
            { 
                id: 'shisha', icon: 'fa-smoking', 
                items: [
                    { img: 'photoluna/shisha.jpg', arName: 'خلطة انكليزى', enName: 'english mix', price: '6,000 IQD' },
                    { img: 'photoluna/shisha.jpg', arName: 'علك نعناع', enName: 'bubble Mint', price: '6,000 IQD' },
                    { img: 'photoluna/shisha.jpg', arName: 'ليمون نعناع', enName: 'Lemon Mint', price: '6,000 IQD' }
                ]
            }
        ];

        // بۆ گەورەکردنی وێنەکان کاتی کلیک
        function openModal(src) {
            document.getElementById('modalImg').src = src;
            document.getElementById('imageModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('imageModal').classList.remove('active');
        }

        let isMusicPlaying = false;
        
        // نوێکردنەوەی شێوەی دوگمەی میوزیک
        function updateMusicIcon() {
            const btn = document.getElementById('musicBtn');
            if(isMusicPlaying) {
                btn.innerHTML = '<i class="fas fa-pause"></i>';
                btn.style.color = "#fff";
            } else {
                btn.innerHTML = '<i class="fas fa-music"></i>';
                btn.style.color = "var(--gold)";
            }
        }

        // داگیرساندن و کوژاندنەوە بە دەستی
        function toggleMusic(e) {
            if(e) e.stopPropagation();
            const audio = document.getElementById('bg-music');
            if(isMusicPlaying) {
                audio.pause();
                isMusicPlaying = false;
            } else {
                audio.play();
                isMusicPlaying = true;
            }
            updateMusicIcon();
        }

        // فەنکشنی زیرەک بۆ لێدانی ئۆتۆماتیکی
        function autoPlayMusic() {
            if (!isMusicPlaying) {
                const audio = document.getElementById('bg-music');
                audio.play().then(() => {
                    isMusicPlaying = true;
                    updateMusicIcon();
                    // لابردنی چاودێرەکان دوای ئەوەی سەرکەوتوو بوو
                    document.removeEventListener('touchstart', autoPlayMusic);
                    document.removeEventListener('click', autoPlayMusic);
                    document.removeEventListener('scroll', autoPlayMusic);
                }).catch(() => {
                    console.log("چاوەڕێی یەکەم جووڵەی بەکارهێنەر دەکات...");
                });
            }
        }

        function changeLang(lang, btn) {
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            if(btn) btn.classList.add('active');
            document.documentElement.dir = content[lang].dir;
            document.documentElement.lang = lang;
            
            const navItems = document.getElementById('nav-items');
            navItems.innerHTML = config.map((c, i) => `<a href="#${c.id}" class="nav-link"><i class="fas ${c.icon}"></i> ${content[lang].nav[i]}</a>`).join('');

            const sections = document.getElementById('menu-sections');
            sections.innerHTML = config.map((c, i) => `
                <section id="${c.id}">
                    <h2 class="section-title"><i class="fas ${c.icon}"></i><span>${content[lang].titles[i]}</span></h2>
                    <div class="menu-grid">${c.items.map((item, j) => `
                        <div class="card">
                            <img src="${item.img}" alt="${lang === 'ar' ? item.arName : item.enName}" onclick="openModal(this.src)">
                            <h3 class="item-name">${lang === 'ar' ? item.arName : item.enName}</h3>
                            <span class="item-price">${item.price}</span>
                        </div>`).join('')}
                    </div>
                </section>`).join('');
        }

        window.onload = () => {
            changeLang('en', document.getElementById('btn-en'));
            
            // 1. هەوڵدان بۆ لێدان یەکسەر لەگەڵ کردنەوەی سایتەکە
            autoPlayMusic();
            
            // 2. ئەگەر براوزەر ڕێگری کرد (کە زۆربەی کات دەیکات)، ئەوا لەگەڵ بچووکترین جووڵە دەستپێدەکات:
            // واتە ئەگەر کەسەکە کەمێک سکرۆڵ بکات یان پەنجە بە شاشەکەدا بنێت، میوزیکەکە بێ ئەوەی هەستی پێبکات دەست پێ دەکات
            document.addEventListener('touchstart', autoPlayMusic, { once: true });
            document.addEventListener('click', autoPlayMusic, { once: true });
            document.addEventListener('scroll', autoPlayMusic, { once: true });
        };
    </script>
</body>
</html>
